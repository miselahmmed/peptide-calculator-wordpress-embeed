<div id="peptide-pro-clean">
<style>
    #peptide-pro-clean {
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        max-width: 950px;
        margin: 20px auto;
        background: #ffffff;
        padding: 30px;
        border-radius: 12px;
        border: 1px solid #e2e8f0;
        color: #334155;
        box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    }

    .peptide-grid {
        display: grid;
        grid-template-columns: 1.2fr 1fr;
        gap: 40px;
    }

    @media(max-width:850px){
        .peptide-grid { grid-template-columns: 1fr; gap: 20px; }
    }

    .section-title {
        font-size: 15px;
        font-weight: 700;
        margin-bottom: 20px;
        color: #0f172a;
    }

    .syringe-list { display: flex; flex-direction: column; gap: 12px; }

    .syringe-option {
        display: flex;
        align-items: center;
        gap: 15px;
        padding: 12px;
        border: 2px solid #e2e8f0;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.3s;
    }

    .syringe-option:hover { border-color: #cbd5e1; }

    .syringe-option.active {
        border-color: #0ea5e9;
        background: #f0f9ff;
    }

    .syringe-option img { width: 150px; height: auto; }
    .syringe-option span { font-weight: 600; font-size: 14px; }

    .input-row {
        display: flex;
        align-items: flex-start;
        gap: 20px;
        margin-bottom: 30px;
    }

    .icon-vial {
        width: 55px;
        height: auto;
        flex-shrink: 0;
    }

    .input-content { flex-grow: 1; }

    .input-content h3 {
        margin: 0 0 10px 0;
        font-size: 14px;
        font-weight: 700;
    }

    .btn-group {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 6px;
        width: 100%;
    }

    .btn-group button {
        padding: 10px 2px;
        border-radius: 6px;
        border: 1px solid #e2e8f0;
        background: #f8fafc;
        color: #475569;
        cursor: pointer;
        font-size: 0.78rem;
        font-weight: 600;
        width: 100%;
        text-align: center;
        white-space: nowrap;
    }

    .btn-group button.active {
        background: #0ea5e9;
        border-color: #0ea5e9;
        color: #fff;
    }

    input.custom-input {
        width: 100%;
        margin-top: 10px;
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #cbd5e1;
        background: #ffffff;
        color: #1e293b;
        font-size: 14px;
        box-sizing: border-box;
    }

    /* RESULT AREA */
    .result-section {
        margin-top: 40px;
        padding: 30px;
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        text-align: center;
    }

    .result-text {
        font-size: 1.2rem;
        font-weight: 600;
        color: #0f172a;
        margin-bottom: 20px;
        line-height: 1.6;
    }

    /* THE BORDER BOX (Only shows when results are ready) */
    .syringe-box-styled {
        border: 2px dashed #0EA5E9;
        padding: 20px;
        border-radius: 10px;
        background: #ffffff;
        margin-bottom: 20px;
    }

    .result-header-label {
        font-size: 0.9rem;
        color: #64748b;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        font-weight: 800;
        margin-bottom: 10px;
        display: block;
    }

    .click-result-box {
        margin-top: 25px;
        padding: 18px;
        background: #0ea5e9;
        color: white;
        border-radius: 10px;
        display: none; /* Hidden until calculated */
        box-shadow: 0 4px 12px rgba(14, 165, 233, 0.25);
    }

    .click-label {
        display: block;
        font-size: 0.8rem;
        text-transform: uppercase;
        opacity: 0.9;
        margin-bottom: 4px;
        font-weight: 800;
    }

    .click-value {
        font-size: 1.3rem;
        font-weight: 700;
    }

    .syringe-visual {
        position: relative;
        width: 100%;
        max-width: 700px;
        margin: 0 auto;
    }

    .scale-img {
        width: 100%;
        display: block;
        position: relative;
        z-index: 2;
        pointer-events: none;
    }

    .fill-overlay {
        position: absolute;
        top: 0;
        left: 0;
        height: 100%;
        width: 0;
        background: #0ea5e9;
        opacity: 0.8;
        z-index: 1;
        transition: width 0.5s ease-out;
    }
</style>

<div class="peptide-grid">
    <div>
        <div class="section-title">What is the total volume of your syringe?</div>
        <div class="syringe-list">
            <div class="syringe-option active" data-units="30">
                <img src="https://pawsofcourse.com/wp-content/uploads/2026/04/syringe-30-units.png">
                <span>0.3 ml (30 units)</span>
            </div>
            <div class="syringe-option" data-units="50">
                <img src="https://pawsofcourse.com/wp-content/uploads/2026/04/syringe-50-units.png">
                <span>0.5 ml (50 units)</span>
            </div>
            <div class="syringe-option" data-units="100">
                <img src="https://pawsofcourse.com/wp-content/uploads/2026/04/syringe-100-units.png">
                <span>1.0 ml (100 units)</span>
            </div>
        </div>
    </div>

    <div>
        <div class="input-row">
            <img class="icon-vial" src="https://peptideslab.co.za/wp-content/uploads/2026/04/Data-Set-5.png">
            <div class="input-content">
                <h3>2. Select Peptide Vial Quantity (mg)</h3>
                <div class="btn-group vial-btns">
                    <button data-val="5">5 mg</button>
                    <button data-val="10">10 mg</button>
                    <button data-val="15">15 mg</button>
                    <button data-val="other">Other</button>
                </div>
                <input class="custom-input vial-input" type="number" placeholder="Enter MG" style="display:none">
            </div>
        </div>

        <div class="input-row">
            <img class="icon-vial" src="https://peptideslab.co.za/wp-content/uploads/2026/04/Data-Set-5fd.png">
            <div class="input-content">
                <h3>3. How much water are you adding? (ml)</h3>
                <div class="btn-group water-btns">
                    <button data-val="1">1 ml</button>
                    <button data-val="2">2 ml</button>
                    <button data-val="3">3 ml</button>
                    <button data-val="other">Other</button>
                </div>
                <input class="custom-input water-input" type="number" placeholder="Enter ML" style="display:none">
            </div>
        </div>

        <div class="input-row">
            <div style="width:55px"></div> 
            <div class="input-content">
                <h3>4. Desired Dose (1000 mcg is 1 mg)</h3>
                <div class="btn-group dose-btns">
                    <button data-val="100">100 mcg</button>
                    <button data-val="250">250 mcg</button>
                    <button data-val="500">500 mcg</button>
                    <button data-val="1000">1 mg</button>
                    <button data-val="5000">5 mg</button>
                    <button data-val="other">Other</button>
                </div>
                <input class="custom-input dose-input" type="number" placeholder="Enter MCG" style="display:none">
            </div>
        </div>
    </div>
</div>

<div class="result-section">
    <div id="main-visual-container">
        <span id="syringe-header" class="result-header-label" style="display:none;">For Syringe</span>
        <div class="result-text" id="final-res-text">Please select values to calculate...</div>
        <div class="syringe-visual">
            <img class="scale-img" id="scale-image" src="https://particlepeptides.com/themes/particlepeptides/assets//img/peptide-calculator/units-30.png">
            <div class="fill-overlay" id="fill-bar"></div>
        </div>
    </div>

    <div id="click-result-display" class="click-result-box">
        <span class="click-label">For V3 Pen</span>
        <span id="click-value-text" class="click-value"></span>
    </div>
</div>

<script>
(function(){
    let syringeSize = 30;
    let vial = 0, water = 0, dose = 0;

    const container = document.getElementById("peptide-pro-clean");

    setupInputGroup(".vial-btns", ".vial-input", (val) => vial = val);
    setupInputGroup(".water-btns", ".water-input", (val) => water = val);
    setupInputGroup(".dose-btns", ".dose-input", (val) => dose = val);

    container.querySelectorAll(".syringe-option").forEach(opt => {
        opt.onclick = () => {
            container.querySelectorAll(".syringe-option").forEach(el => el.classList.remove("active"));
            opt.classList.add("active");
            syringeSize = parseFloat(opt.dataset.units);
            
            const img = document.getElementById("scale-image");
            img.src = `https://particlepeptides.com/themes/particlepeptides/assets//img/peptide-calculator/units-${syringeSize}.png`;
            
            img.onload = calculate;
            calculate();
        };
    });

    function setupInputGroup(btnGroupClass, inputClass, stateUpdateFunc) {
        const btns = container.querySelectorAll(btnGroupClass + " button");
        const input = container.querySelector(inputClass);

        btns.forEach(btn => {
            btn.onclick = () => {
                btns.forEach(b => b.classList.remove("active"));
                btn.classList.add("active");

                if (btn.dataset.val === "other") {
                    input.style.display = "block";
                    stateUpdateFunc(parseFloat(input.value) || 0);
                } else {
                    input.style.display = "none";
                    stateUpdateFunc(parseFloat(btn.dataset.val));
                }
                calculate();
            };
        });

        input.oninput = () => {
            stateUpdateFunc(parseFloat(input.value) || 0);
            calculate();
        };
    }

    function calculate() {
        const visualWrap = document.getElementById("main-visual-container");
        const syringeHeader = document.getElementById("syringe-header");
        const textDisplay = document.getElementById("final-res-text");
        const clickDisplay = document.getElementById("click-result-display");
        const clickValueText = document.getElementById("click-value-text");
        const fillBar = document.getElementById("fill-bar");

        // RESET DEFAULT VIEW
        if (!vial || !water || !dose) {
            visualWrap.classList.remove("syringe-box-styled");
            syringeHeader.style.display = "none";
            textDisplay.innerHTML = "Please select values to calculate...";
            clickDisplay.style.display = "none";
            fillBar.style.width = "0%";
            return;
        }

        const totalMcg = vial * 1000;
        const concentration = totalMcg / water; 
        const mlResult = dose / concentration;
        const unitsResult = mlResult * 100;
        const clicksResult = Math.round(mlResult * 100);

        if (unitsResult > syringeSize) {
            visualWrap.classList.remove("syringe-box-styled");
            syringeHeader.style.display = "none";
            textDisplay.innerHTML = `<span style="color:#ef4444">⚠️ Dose (${unitsResult.toFixed(1)} units) exceeds syringe capacity!</span>`;
            clickDisplay.style.display = "none";
            fillBar.style.width = "0%";
        } else {
            // ADOPT NEW FEATURES
            visualWrap.classList.add("syringe-box-styled");
            syringeHeader.style.display = "block";
            
            let doseLabel = dose >= 1000 ? (dose/1000) + " mg" : dose + " mcg";
            textDisplay.innerHTML = `To have a dose of <b>${doseLabel}</b> pull the syringe to <b>${unitsResult.toFixed(1)} units</b>`;
            
            clickValueText.innerHTML = `Injection Volume: ${clicksResult} Clicks`;
            clickDisplay.style.display = "block";

            // SCALE CALCULATION
            let start = 0.4, end = 100;
            let ratio = unitsResult / syringeSize;
            if (ratio > 1) ratio = 1;
            const activeArea = end - start;
            const finalWidthPercent = start + (ratio * activeArea);
            fillBar.style.width = finalWidthPercent + "%";
        }
    }
})();
</script>
</div>
